<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Liquid Chrome</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;cursor:none}
  canvas{display:block;width:100vw;height:100vh}
  #cur{
    position:fixed;width:4px;height:4px;border-radius:50%;
    background:#fff;pointer-events:none;transform:translate(-50%,-50%);
    mix-blend-mode:difference;z-index:99;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="cur"></div>
<div class="glassy-container">
  <h2>Spotlight Card</h2>
  <p>This card has a spotlight hover effect.</p>
</div>
<script>
(() => {
  const cur = document.getElementById('cur');
  window.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  }, {passive:true});

  // ── LITE QUALITY — works great on any device ─────────────────────────
  const Q = { dpr: 1, marchSteps: 72, aoSamples: 4, msaa: 2, stepMul: '0.65' };

  const canvas = document.getElementById('c');
  const gl = canvas.getContext('webgl2') || canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if(!gl){ document.body.innerHTML='<p style="color:#fff;padding:2rem">WebGL not supported</p>'; return; }

  const VS = `
  precision highp float;
  attribute vec2 a_pos;
  varying   vec2 v_uv;
  void main(){ v_uv=a_pos*0.5+0.5; gl_Position=vec4(a_pos,0.0,1.0); }`;


  const FS = `
  precision highp float;
  varying vec2  v_uv;
  uniform vec2  u_res;
  uniform float u_time;
  uniform vec2  u_mouse;

  #define PI   3.14159265359
  #define FAR  20.0
  #define SURF 0.0003

  float smin(float a, float b, float k){
    float h=max(k-abs(a-b),0.0)/k;
    return min(a,b)-h*h*h*k*(1.0/6.0);
  }

  vec3 blobP(int i, float t, vec2 mouse){
    float fi=float(i);
    float ph=fi*2.39996323;
    float rx=1.30+fi*0.14;
    float ry=0.90+fi*0.13;
    float rz=0.55+fi*0.10;
    float sp=0.11+fi*0.028;
    vec3 p=vec3(
      rx*sin(t*sp      +ph),
      ry*cos(t*sp*1.23 +ph+0.5),
      rz*sin(t*sp*0.81 +ph+1.9)
    );
    vec2 m=(mouse-0.5)*vec2(u_res.x/u_res.y,1.0)*3.8;
    float pull=max(0.0,0.32-fi*0.04);
    p.xy+=(vec2(m.x,-m.y)-p.xy)*pull*0.5;
    return p;
  }

  float sdf(vec3 p, float t, vec2 mouse){
    float d=FAR;
    for(int i=0;i<9;i++){
      float r=0.44+float(i-(i/4)*4)*0.08;
      d=smin(d,length(p-blobP(i,t,mouse))-r,1.05);
    }
    return d;
  }

  vec3 calcN(vec3 p, float t, vec2 mouse){
    float e=0.0003;
    return normalize(vec3(
      sdf(p+vec3(e,0,0),t,mouse)-sdf(p-vec3(e,0,0),t,mouse),
      sdf(p+vec3(0,e,0),t,mouse)-sdf(p-vec3(0,e,0),t,mouse),
      sdf(p+vec3(0,0,e),t,mouse)-sdf(p-vec3(0,0,e),t,mouse)
    ));
  }

  vec3 env(vec3 dir, float wl){
    float az  = atan(dir.x, dir.z) / PI;
    float azA = abs(az);
    float el  = dir.y;
    vec3  c   = vec3(0.0);

    float ceiling = max(el, 0.0);
    float ceilPow = ceiling * (0.6 + 0.4*ceiling);
    vec3  ceilCol = mix(vec3(0.85,0.83,0.78), vec3(0.80,0.84,0.90), clamp(az*0.5+0.5,0.,1.));
    c += ceilCol * ceilPow * 1.8;

    float floor_ = max(-el, 0.0);
    c += vec3(0.04, 0.035, 0.03) * floor_ * floor_;

    float horizDark = 1.0 - smoothstep(0.0, 0.22, abs(el - 0.05));
    c *= 1.0 - horizDark * 0.72;

    float horizLine = smoothstep(0.008, 0.0, abs(el - 0.18) - 0.015);
    c += vec3(0.55, 0.58, 0.62) * horizLine * 1.2;

    float chromShift = (wl - 0.5) * 0.05;
    float kEl = smoothstep(0.007, 0.0, abs(el - (0.55 + chromShift)) - 0.12);
    float kAz = smoothstep(0.007, 0.0, abs(az + 0.38) - 0.28);
    c += kEl * kAz * mix(vec3(0.92,0.94,1.00), vec3(0.98,0.97,0.95), wl) * 6.0;

    float fEl = smoothstep(0.006, 0.0, abs(el - (0.30 - chromShift)) - 0.09);
    float fAz = smoothstep(0.006, 0.0, abs(az - 0.55) - 0.22);
    c += fEl * fAz * mix(vec3(1.00,0.82,0.55), vec3(1.00,0.90,0.72), wl) * 4.5;

    float rEl = smoothstep(0.004, 0.0, abs(el - 0.40) - 0.05);
    float rAz = smoothstep(0.004, 0.0, abs(azA - 0.92) - 0.06);
    c += rEl * rAz * vec3(0.50,0.60,0.80) * 3.0;

    float uEl = smoothstep(0.004, 0.0, abs(el + 0.58 - chromShift*0.5) - 0.03);
    float uAz = smoothstep(0.60, 0.05, azA);
    c += uEl * uAz * mix(vec3(0.12,0.35,1.00), vec3(0.05,0.22,0.80), 1.0-wl) * 3.5;

    float disp = (wl - 0.5) * 0.05;
    vec3  nA   = normalize(vec3(-0.30+disp, 0.88, 0.42));
    c += pow(max(dot(dir,nA),0.0),2400.0) * 35.0
       * mix(vec3(0.90,0.95,1.00), vec3(1.00,0.97,0.92), wl);

    vec3  nB = normalize(vec3(0.68+disp*0.5, 0.22, 0.66));
    c += pow(max(dot(dir,nB),0.0),1800.0) * 20.0
       * mix(vec3(1.00,0.75,0.40), vec3(1.00,0.88,0.65), wl);

    return c;
  }

  float ao(vec3 p, vec3 n, float t, vec2 mouse){
    float occ=0.0, w=1.0;
    for(int i=1;i<=${Q.aoSamples};i++){
      float h=float(i)*0.09;
      occ+=w*(h-sdf(p+n*h,t,mouse));
      w*=0.50;
    }
    return clamp(1.0-occ*3.5, 0.0, 1.0);
  }

  float schlick(float c, float f0){
    return f0+(1.0-f0)*pow(clamp(1.0-c,0.0,1.0),5.0);
  }

  vec3 chromaticRefl(vec3 rd, vec3 N, float ndv){
    float ds  = 0.030 * pow(1.0-ndv, 1.5);
    vec3  up  = abs(N.y)<0.9 ? vec3(0,1,0) : vec3(1,0,0);
    vec3  tng = normalize(cross(N,up));
    vec3  up2 = normalize(cross(tng,N));
    vec3  NR  = normalize(N + tng*ds*0.6 - up2*ds*0.25);
    vec3  NB  = normalize(N - tng*ds*0.6 + up2*ds*0.25);
    float r   = env(reflect(rd,NR), 0.0).r;
    float g   = env(reflect(rd,N),  0.5).g;
    float b   = env(reflect(rd,NB), 1.0).b;
    return vec3(r,g,b);
  }

  vec2 jitter(int s){
    if(s==0) return vec2(-0.25,-0.75);
    if(s==1) return vec2( 0.75,-0.25);
    if(s==2) return vec2( 0.25, 0.75);
             return vec2(-0.75, 0.25);
  }

  void main(){
    float asp=u_res.x/u_res.y;
    float t  =u_time;
    vec3  col=vec3(0.0);

    for(int s=0;s<${Q.msaa};s++){
      vec2 jit=jitter(s)/u_res;
      vec2 px =(v_uv+jit-0.5)*vec2(asp,1.0)*2.0;

      vec3 ro=vec3(0.0,0.0,5.5);
      vec3 rd=normalize(vec3(px*0.42,-1.0));

      float dist=0.0; bool hit=false;
      for(int i=0;i<${Q.marchSteps};i++){
        float d=sdf(ro+rd*dist,t,u_mouse);
        if(d<SURF){hit=true;break;}
        if(dist>FAR) break;
        dist+=d*${Q.stepMul};
      }

      vec3 sc=vec3(0.0);

      if(hit){
        vec3  pos =ro+rd*dist;
        vec3  N   =calcN(pos,t,u_mouse);
        vec3  V   =-rd;
        float ndv =max(dot(N,V),0.0);

        vec3 refl=chromaticRefl(rd,N,ndv);

        vec3  up  =abs(N.y)<0.99?vec3(0,1,0):vec3(1,0,0);
        vec3  tng =normalize(cross(N,up));
        float scr =(sin(dot(pos,tng)*88.0+pos.y*47.0)
                   +sin(dot(pos,tng)*210.0))*0.25+0.5;
        vec3 Ns  =normalize(N+tng*scr*0.020-up*scr*0.006);
        vec3 Rs  =reflect(rd,Ns);
        vec3 scrC=vec3(env(Rs,0.0).r,env(Rs,0.5).g,env(Rs,1.0).b);

        float F  =schlick(ndv,0.97);
        refl     =mix(scrC,refl,F);

        float occl=ao(pos,N,t,u_mouse);
        occl=occl*occl;

        float silMask=pow(1.0-ndv,2.2);
        vec3 fR=env(reflect(rd,normalize(N+tng*0.08)),0.0);
        vec3 fB=env(reflect(rd,normalize(N-tng*0.08)),1.0);
        vec3 fringe=vec3(fR.r,refl.g,fB.b)*silMask*0.9;

        float edgeDark=pow(ndv,0.60);

        sc=(refl*occl+fringe)*edgeDark;
      }

      col+=sc;
    }
    col/=float(${Q.msaa});

    col*=0.80;
    col=(col*(2.51*col+0.03))/(col*(2.43*col+0.59)+0.14);
    col=clamp(col,0.0,1.0);

    float lum=dot(col,vec3(0.2126,0.7152,0.0722));
    col=mix(col,vec3(lum),0.20);

    col*=vec3(0.94,0.97,1.00);
    col=pow(col,vec3(1.15));
    col=col*1.12;
    col=clamp(col,0.0,1.0);
    col=pow(max(col,0.0),vec3(1.0/2.2));

    gl_FragColor=vec4(col,1.0);
  }`;

  function mkS(type,src){
    const s=gl.createShader(type);
    gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))
      console.error('Shader error:\n'+gl.getShaderInfoLog(s));
    return s;
  }
  const prog=gl.createProgram();
  gl.attachShader(prog,mkS(gl.VERTEX_SHADER,VS));
  gl.attachShader(prog,mkS(gl.FRAGMENT_SHADER,FS));
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS))
    console.error('Link:',gl.getProgramInfoLog(prog));

  const vbuf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,vbuf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const posLoc=gl.getAttribLocation(prog,'a_pos');
  gl.enableVertexAttribArray(posLoc);
  gl.bindBuffer(gl.ARRAY_BUFFER,vbuf);
  gl.vertexAttribPointer(posLoc,2,gl.FLOAT,false,0,0);

  gl.useProgram(prog);
  const uRes  =gl.getUniformLocation(prog,'u_res');
  const uTime =gl.getUniformLocation(prog,'u_time');
  const uMouse=gl.getUniformLocation(prog,'u_mouse');

  let mouse={x:.5,y:.5},tgt={x:.5,y:.5};
  window.addEventListener('mousemove',e=>{
    tgt.x=e.clientX/window.innerWidth;
    tgt.y=e.clientY/window.innerHeight;
  },{passive:true});
  window.addEventListener('touchmove',e=>{
    if(e.touches.length){
      tgt.x=e.touches[0].clientX/window.innerWidth;
      tgt.y=e.touches[0].clientY/window.innerHeight;
    }
  },{passive:true});

  function resize(){
    // Cap DPR at 1 — renders 4x fewer pixels on a 2x display,
    // completely invisible at normal viewing distances.
    const dpr=Math.min(window.devicePixelRatio||1, Q.dpr);
    canvas.width =Math.floor(window.innerWidth *dpr);
    canvas.height=Math.floor(window.innerHeight*dpr);
    canvas.style.width =window.innerWidth +'px';
    canvas.style.height=window.innerHeight+'px';
    gl.viewport(0,0,canvas.width,canvas.height);
    gl.useProgram(prog);
    gl.uniform2f(uRes,canvas.width,canvas.height);
  }
  window.addEventListener('resize',resize,{passive:true});
  resize();

  const t0=performance.now();
  (function loop(){
    requestAnimationFrame(loop);
    mouse.x+=(tgt.x-mouse.x)*0.035;
    mouse.y+=(tgt.y-mouse.y)*0.035;
    gl.useProgram(prog);
    gl.uniform1f(uTime,(performance.now()-t0)/1000);
    gl.uniform2f(uMouse,mouse.x,mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  })();
})();
</script>
</body>
</html>
