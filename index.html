<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Liquid Metal Background</title>
<style>
  html,body { height:100%; margin:0; background:black; }
  #bg-canvas-container {
    position: fixed;
    inset: 0;          /* top:0; right:0; bottom:0; left:0; */
    width: 100vw;
    height: 100vh;
    z-index: -1;
    pointer-events: none; /* allow clicking through */
    background: black;
  }
</style>
</head>
<body>

<!-- Paste this entire block into a blank HTML page (or into your page) -->
<div id="bg-canvas-container" style="position:fixed;inset:0;pointer-events:none;"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
(() => {
  // -----------------------
  // Setup + fallback logic
  // -----------------------
  const container = document.getElementById('bg-canvas-container');
  const attachToBodyIfHidden = true;

  // debug panel
  const panel = document.createElement('div');
  panel.style.position = 'fixed';
  panel.style.left = '8px';
  panel.style.top = '8px';
  panel.style.zIndex = '2147483647';
  panel.style.padding = '8px 10px';
  panel.style.background = 'rgba(0,0,0,0.75)';
  panel.style.color = 'white';
  panel.style.fontFamily = 'monospace';
  panel.style.fontSize = '12px';
  panel.style.borderRadius = '6px';
  panel.style.minWidth = '220px';
  panel.style.whiteSpace = 'pre-wrap';
  panel.style.cursor = 'default';
  document.body.appendChild(panel);

  const btn = document.createElement('button');
  btn.textContent = 'TOGGLE SHADER';
  btn.style.display = 'block';
  btn.style.marginTop = '8px';
  btn.style.cursor = 'pointer';

  const info = document.createElement('div');
  info.style.marginTop = '6px';
  panel.appendChild(info);
  panel.appendChild(btn);

  // create renderer and attach to container (or body fallback)
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.domElement.style.position = 'fixed';
  renderer.domElement.style.inset = '0';
  renderer.domElement.style.width = '100%';
  renderer.domElement.style.height = '100%';
  renderer.domElement.style.pointerEvents = 'none';
  // start with a high stacking order to be visible; you can change later
  renderer.domElement.style.zIndex = '0';

  let attachedTo = 'container';
  if (container) {
    container.style.width = container.style.width || '100vw';
    container.style.height = container.style.height || '100vh';
    container.style.top = container.style.top || '0';
    container.style.left = container.style.left || '0';
    container.appendChild(renderer.domElement);
  } else {
    document.body.appendChild(renderer.domElement);
    attachedTo = 'body';
  }

  // if container exists but is likely behind background, optionally reattach to body
  function maybeReattachIfHidden() {
    const rect = renderer.domElement.getBoundingClientRect();
    if ((rect.width === 0 || rect.height === 0) && attachToBodyIfHidden) {
      if (renderer.domElement.parentElement !== document.body) {
        document.body.appendChild(renderer.domElement);
        attachedTo = 'body-fallback';
      }
    }
  }

  // -----------------------
  // Scene / camera / quad
  // -----------------------
  const scene = new THREE.Scene();
  const camera = new THREE.Camera();
  camera.position.z = 1;

  const geometry = new THREE.PlaneGeometry(2, 2);

  // Uniforms
  const uniforms = {
    u_time: { value: 0.0 },
    u_resolution: { value: new THREE.Vector2(1, 1) },
    u_mouse: { value: new THREE.Vector2(-9999, -9999) },
    u_debug: { value: 1.0 } // start with debug gradient ON
  };

  // Metal shader (keeps same structure as earlier but behind debug toggle)
  const material = new THREE.ShaderMaterial({
    uniforms,
    vertexShader: `
      varying vec2 vUv;
      void main(){
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform vec2 u_resolution;
      uniform float u_time;
      uniform vec2 u_mouse;
      uniform float u_debug;

      // Simplex noise
      vec3 mod289(vec3 x){return x - floor(x*(1.0/289.0))*289.0;}
      vec2 mod289(vec2 x){return x - floor(x*(1.0/289.0))*289.0;}
      vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}
      float snoise(vec2 v){
        const vec4 C = vec4(0.2113248654,0.3660254038,-0.5773502692,0.0243902439);
        vec2 i = floor(v + dot(v, C.yy));
        vec2 x0 = v - i + dot(i, C.xx);
        vec2 i1 = (x0.x > x0.y) ? vec2(1.0,0.0) : vec2(0.0,1.0);
        vec4 x12 = x0.xyxy + C.xxzz; x12.xy -= i1;
        i = mod289(i);
        vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
        vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
        m = m*m; m = m*m;
        vec3 x = 2.0 * fract(p * C.www) - 1.0;
        vec3 h = abs(x) - 0.5;
        vec3 ox = floor(x + 0.5);
        vec3 a0 = x - ox;
        m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
        vec3 g;
        g.x = a0.x * x0.x + h.x * x0.y;
        g.yz = a0.yz * x12.xz + h.yz * x12.yw;
        return 130.0 * dot(m,g);
      }

      float fbm(vec2 p) {
        float total = 0.0;
        float amp = 1.0;
        float sc = 1.0;
        for (int i = 0; i < 5; i++) {
          total += snoise(p * sc) * amp;
          sc *= 2.0;
          amp *= 0.5;
        }
        return total;
      }

      // debug gradient mode (forced if u_debug > 0.5)
      void main() {
        vec2 uv = vUv;
        if (u_debug > 0.5) {
          // clear visible gradient that can't be black
          gl_FragColor = vec4(uv.x, uv.y*0.6+0.2, 0.0, 1.0);
          return;
        }

        // aspect-correct coords
        vec2 aspect = vec2(u_resolution.x / u_resolution.y, 1.0);
        vec2 p = (uv - 0.5) * aspect;

        // layered noise
        float t = u_time * 0.6;
        float n = fbm(p * 2.5 + vec2(t*0.35, -t*0.25));
        n += fbm(p * 5.0 + vec2(-t*0.55, t*0.45)) * 0.5;
        n += fbm(p * 12.0 + vec2(t*0.15, t*0.05)) * 0.25;

        n = n * 0.5 + 0.5;

        // mouse warp (pixel coords -> normalized)
        vec2 m = u_mouse / u_resolution;
        vec2 mnorm = (m - 0.5) * vec2(u_resolution.x/u_resolution.y, 1.0);
        float md = exp(-length(p - mnorm) * 5.0) * 0.8;
        n += md * 0.25;

        // mask + lighting
        float mask = smoothstep(0.32, 0.78, n);
        // compute normal by simple derivative
        float eps = 0.001;
        float hL = fbm((p + vec2(-eps,0.0))*3.0 + vec2(t*0.35, -t*0.25));
        float hR = fbm((p + vec2( eps,0.0))*3.0 + vec2(t*0.35, -t*0.25));
        float hD = fbm((p + vec2(0.0,-eps))*3.0 + vec2(t*0.35, -t*0.25));
        float hU = fbm((p + vec2(0.0, eps))*3.0 + vec2(t*0.35, -t*0.25));
        vec3 N = normalize(vec3(hL - hR, hD - hU, 2.0*eps));

        vec3 view = vec3(0.0, 0.0, 1.0);
        vec3 light = normalize(vec3(0.6, 0.8, 0.4));
        vec3 H = normalize(view + light);

        float diff = max(dot(N, light), 0.0) * 0.25;
        float spec = pow(max(dot(N, H), 0.0), 60.0) * 1.4;
        float fres = pow(1.0 - max(dot(N, view), 0.0), 2.2) * 0.18;

        vec3 base = vec3(0.02,0.02,0.03);
        vec3 mid = vec3(0.12,0.14,0.16) + diff;
        vec3 hi  = vec3(0.95,0.98,1.0) * spec;

        vec3 metal = mix(base, mid, mask) + hi + vec3(0.12) * fres * mask;

        float vign = smoothstep(1.0, 0.25, length((uv - 0.5)*aspect));
        vec3 color = mix(vec3(0.0), metal, mask) * mix(0.96, 1.0, vign);

        gl_FragColor = vec4(color, 1.0);
      }
    `,
    depthWrite: false,
    depthTest: false
  });

  const quad = new THREE.Mesh(geometry, material);
  scene.add(quad);

  // -----------------------
  // Resize / pixel + debug checks
  // -----------------------
  function resize() {
    maybeReattachIfHidden();
    const w = Math.max(1, renderer.domElement.clientWidth || window.innerWidth);
    const h = Math.max(1, renderer.domElement.clientHeight || window.innerHeight);
    renderer.setSize(w, h, false);
    uniforms.u_resolution.value.set(renderer.domElement.width, renderer.domElement.height);
  }
  window.addEventListener('resize', resize, { passive: true });
  resize();

  // center pixel read test
  function readCenterPixel() {
    try {
      const gl = renderer.getContext();
      const x = Math.floor(renderer.domElement.width / 2);
      const y = Math.floor(renderer.domElement.height / 2);
      const pixels = new Uint8Array(4);
      gl.readPixels(x, y, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
      return pixels;
    } catch (e) {
      return null;
    }
  }

  // -----------------------
  // Mouse for interaction
  // -----------------------
  window.addEventListener('mousemove', (e) => {
    const rect = renderer.domElement.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    uniforms.u_mouse.value.set(x, renderer.domElement.height - y);
  }, { passive:true });

  // -----------------------
  // Animation loop
  // -----------------------
  let last = performance.now();
  function animate() {
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt = (now - last) / 1000;
    last = now;
    uniforms.u_time.value += dt;
    renderer.render(scene, camera);

    // update debug panel
    const pixels = readCenterPixel();
    const pxText = pixels ? (pixels[0]+','+pixels[1]+','+pixels[2]+','+pixels[3]) : 'n/a';
    info.innerText = [
      'attachedTo: ' + attachedTo,
      'canvas CSS px: ' + renderer.domElement.clientWidth + ' x ' + renderer.domElement.clientHeight,
      'drawingBuffer: ' + renderer.domElement.width + ' x ' + renderer.domElement.height,
      'u_debug: ' + uniforms.u_debug.value,
      'centerPixel RGBA: ' + pxText,
      'Tip: click TOGGLE SHADER to switch to metal shader'
    ].join('\\n');
  }
  animate();

  // -----------------------
  // Toggle button behaviour
  // -----------------------
  btn.addEventListener('click', () => {
    uniforms.u_debug.value = uniforms.u_debug.value > 0.5 ? 0.0 : 1.0;
  });

  // final safety: if debug gradient is not visible after 500ms, reattach to body
  setTimeout(() => {
    const pixels = readCenterPixel();
    const isBlack = pixels && (pixels[0] === 0 && pixels[1] === 0 && pixels[2] === 0);
    if (isBlack && attachToBodyIfHidden && renderer.domElement.parentElement !== document.body) {
      document.body.appendChild(renderer.domElement);
      attachedTo = 'body-forced';
      resize();
    }
  }, 600);

})();
</script>

</body>
</html>
